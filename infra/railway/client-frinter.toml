[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build:client3"
watchPatterns = [
  "apps/client-frinter/**",
  "package.json",
  "package-lock.json",
  "infra/railway/client-frinter.toml",
  "scripts/monorepo/client-bff.mjs",
  "scripts/monorepo/noop-build.mjs",
]

[deploy]
startCommand = "npm run start:client3"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
