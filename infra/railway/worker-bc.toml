[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build:workers"
watchPatterns = [
  "workers/runner/**",
  "workers/worker-bc/**",
  "scripts/bc-*.ts",
  "package.json",
  "package-lock.json",
  "src/**",
  "infra/railway/worker-bc.toml",
  "scripts/monorepo/noop-build.mjs",
]

[deploy]
startCommand = "npm run start:worker:bc-scrape"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
