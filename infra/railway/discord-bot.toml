[build]
builder = "NIXPACKS"
buildCommand = "npm install"
watchPatterns = [
  "workers/discord-bot/**",
  "package.json",
  "package-lock.json",
  "infra/railway/discord-bot.toml",
]

[deploy]
startCommand = "npm --workspace workers/discord-bot run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
