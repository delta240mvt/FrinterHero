<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="20" fill="#d4c080"/>
  <!-- shoulders/body -->
  <ellipse cx="20" cy="46" rx="18" ry="10" fill="#6040a0"/>
  <!-- hair (longer, golden/blonde) -->
  <ellipse cx="20" cy="11" rx="13" ry="10" fill="#b07818"/>
  <ellipse cx="7" cy="24" rx="5.5" ry="12" fill="#b07818"/>
  <ellipse cx="33" cy="24" rx="5.5" ry="12" fill="#b07818"/>
  <!-- neck -->
  <rect x="16" y="33" width="8" height="8" rx="2" fill="#fae8d0"/>
  <!-- face (lighter skin) -->
  <ellipse cx="20" cy="22" rx="11" ry="12" fill="#fae8d0"/>
  <!-- hair front -->
  <path d="M9 17 Q11 7 20 7 Q29 7 31 17 Q27 12 20 13 Q13 12 9 17Z" fill="#b07818"/>
  <!-- eyebrows (lighter) -->
  <path d="M13.5 17 Q16 15.8 18.5 17" stroke="#906010" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M21.5 17 Q24 15.8 26.5 17" stroke="#906010" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- eyes (blue-grey) -->
  <ellipse cx="16" cy="20" rx="2.6" ry="2.1" fill="#4a6888"/>
  <ellipse cx="24" cy="20" rx="2.6" ry="2.1" fill="#4a6888"/>
  <circle cx="17" cy="19.2" r="0.9" fill="white" opacity="0.88"/>
  <circle cx="25" cy="19.2" r="0.9" fill="white" opacity="0.88"/>
  <!-- nose -->
  <ellipse cx="20" cy="24.5" rx="1.5" ry="1" fill="#e8c0a0"/>
  <!-- smile -->
  <path d="M15.5 28 Q20 32 24.5 28" stroke="#c87868" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- cheek blush -->
  <ellipse cx="12.5" cy="24" rx="2.5" ry="1.5" fill="#f09090" opacity="0.22"/>
  <ellipse cx="27.5" cy="24" rx="2.5" ry="1.5" fill="#f09090" opacity="0.22"/>
</svg>
