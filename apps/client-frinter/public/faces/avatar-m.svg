<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="20" fill="#8ab0c0"/>
  <!-- shoulders/body -->
  <ellipse cx="20" cy="46" rx="18" ry="10" fill="#1e3a5a"/>
  <!-- hair (short, dark) -->
  <ellipse cx="20" cy="10" rx="12" ry="8" fill="#18100a"/>
  <path d="M8 16 Q8 8 20 8 Q32 8 32 16 Q30 11 20 11 Q10 11 8 16Z" fill="#18100a"/>
  <!-- neck -->
  <rect x="16" y="33" width="8" height="8" rx="2" fill="#d4b08a"/>
  <!-- face -->
  <ellipse cx="20" cy="21" rx="11" ry="13" fill="#d4b08a"/>
  <!-- beard shadow -->
  <ellipse cx="20" cy="29" rx="8.5" ry="4.5" fill="#b89070" opacity="0.38"/>
  <!-- eyebrows (thicker) -->
  <path d="M13 16.5 Q16 14.8 19 16.5" stroke="#18100a" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <path d="M21 16.5 Q24 14.8 27 16.5" stroke="#18100a" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <!-- eyes (darker brown) -->
  <ellipse cx="16" cy="20" rx="2.6" ry="2.1" fill="#1e100a"/>
  <ellipse cx="24" cy="20" rx="2.6" ry="2.1" fill="#1e100a"/>
  <circle cx="17" cy="19.2" r="0.9" fill="white" opacity="0.82"/>
  <circle cx="25" cy="19.2" r="0.9" fill="white" opacity="0.82"/>
  <!-- nose (stronger) -->
  <path d="M19 23 Q18 25.5 19.2 26.5 Q20 27 20.8 26.5 Q22 25.5 21 23" stroke="#b08060" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- mouth - neutral/slight smile -->
  <path d="M16.5 29.5 Q20 32 23.5 29.5" stroke="#a06848" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
