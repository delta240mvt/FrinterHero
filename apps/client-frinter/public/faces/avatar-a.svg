<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="20" fill="#507060"/>
  <!-- shoulders/body -->
  <ellipse cx="20" cy="46" rx="18" ry="10" fill="#2d5a40"/>
  <!-- hair (full, dark curly) -->
  <ellipse cx="20" cy="9" rx="14" ry="10" fill="#120802"/>
  <ellipse cx="6" cy="22" rx="7" ry="12" fill="#120802"/>
  <ellipse cx="34" cy="22" rx="7" ry="12" fill="#120802"/>
  <ellipse cx="20" cy="6" rx="11" ry="7" fill="#120802"/>
  <!-- neck -->
  <rect x="16" y="33" width="8" height="8" rx="2" fill="#b07858"/>
  <!-- face (deeper skin tone) -->
  <ellipse cx="20" cy="22" rx="11" ry="12" fill="#c08868"/>
  <!-- hair hairline -->
  <path d="M9 17 Q11 7 20 7 Q29 7 31 17 Q27 14 20 14 Q13 14 9 17Z" fill="#120802"/>
  <!-- eyebrows (strong) -->
  <path d="M13 17 Q16 15.5 19 17" stroke="#120802" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M21 17 Q24 15.5 27 17" stroke="#120802" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- eyes (dark brown) -->
  <ellipse cx="16" cy="20" rx="2.6" ry="2.1" fill="#100802"/>
  <ellipse cx="24" cy="20" rx="2.6" ry="2.1" fill="#100802"/>
  <circle cx="17" cy="19.2" r="0.9" fill="white" opacity="0.84"/>
  <circle cx="25" cy="19.2" r="0.9" fill="white" opacity="0.84"/>
  <!-- nose (fuller) -->
  <ellipse cx="20" cy="24.5" rx="2" ry="1.3" fill="#a06848"/>
  <!-- smile (wide, warm) -->
  <path d="M15.5 28 Q20 32.5 24.5 28" stroke="#904030" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <!-- lower lip hint -->
  <path d="M17 30.5 Q20 32 23 30.5" stroke="#b06050" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
