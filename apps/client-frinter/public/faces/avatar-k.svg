<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- background fill (matches clip circle) -->
  <circle cx="20" cy="20" r="20" fill="#e8a898"/>
  <!-- shoulders/body hint -->
  <ellipse cx="20" cy="46" rx="18" ry="10" fill="#c05540"/>
  <!-- hair back -->
  <ellipse cx="20" cy="11" rx="12" ry="10" fill="#3d1f0a"/>
  <ellipse cx="8" cy="22" rx="5" ry="10" fill="#3d1f0a"/>
  <ellipse cx="32" cy="22" rx="5" ry="10" fill="#3d1f0a"/>
  <!-- neck -->
  <rect x="16" y="33" width="8" height="8" rx="2" fill="#f5c8a8"/>
  <!-- face -->
  <ellipse cx="20" cy="22" rx="11" ry="12" fill="#f5c8a8"/>
  <!-- hair front -->
  <path d="M9 16 Q11 7 20 7 Q29 7 31 16 Q27 12 20 12 Q13 12 9 16Z" fill="#3d1f0a"/>
  <!-- eyebrows -->
  <path d="M13.5 17 Q16 15.5 18.5 17" stroke="#3d1f0a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M21.5 17 Q24 15.5 26.5 17" stroke="#3d1f0a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="16" cy="20" rx="2.6" ry="2.1" fill="#2c1810"/>
  <ellipse cx="24" cy="20" rx="2.6" ry="2.1" fill="#2c1810"/>
  <circle cx="17" cy="19.2" r="0.9" fill="white" opacity="0.85"/>
  <circle cx="25" cy="19.2" r="0.9" fill="white" opacity="0.85"/>
  <!-- nose -->
  <ellipse cx="20" cy="24.5" rx="1.6" ry="1" fill="#e0a880"/>
  <!-- mouth smile -->
  <path d="M15.5 28 Q20 32 24.5 28" stroke="#c07060" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- cheek blush -->
  <ellipse cx="12.5" cy="24" rx="2.5" ry="1.5" fill="#f09090" opacity="0.28"/>
  <ellipse cx="27.5" cy="24" rx="2.5" ry="1.5" fill="#f09090" opacity="0.28"/>
</svg>
